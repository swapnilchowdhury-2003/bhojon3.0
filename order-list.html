<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhojonroshik | Order List</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .page-card {
            border: none;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }
        .table td, .table th {
            vertical-align: middle;
        }
    </style>
</head>
<body class="bg-light">
    <div class="container py-5">
        <div class="card page-card p-4">
            <div class="d-flex justify-content-between align-items-center mb-3">
                <h2 class="mb-0 text-danger fw-bold">Order List</h2>
                <a href="order.html" class="btn btn-outline-danger">+ New Order</a>
            </div>

            <div id="statusMsg" class="alert alert-info py-2 d-none"></div>

            <div class="table-responsive">
                <table class="table table-striped table-hover align-middle">
                    <thead class="table-danger">
                        <tr>
                            <th>Food</th>
                            <th>Table</th>
                            <th>Qty</th>
                            <th>Timestamp</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ordersTableBody"></tbody>
                </table>
            </div>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5_COc-eWmC3LZRWJurQykXkq6hX9EbvQ",
            authDomain: "bhojonroshik.firebaseapp.com",
            projectId: "bhojonroshik",
            storageBucket: "bhojonroshik.firebasestorage.app",
            messagingSenderId: "306999367535",
            appId: "1:306999367535:web:9d617d11321d956fb2ba9a",
            databaseURL: "https://bhojonroshik-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const ordersEndpoint = `${firebaseConfig.databaseURL}/orders.json`;
        const tableBody = $("#ordersTableBody");
        const statusMsg = $("#statusMsg");
        let ordersCache = {};

        function showMessage(message, type = "info") {
            statusMsg.removeClass("d-none alert-info alert-success alert-danger");
            statusMsg.addClass(`alert-${type}`).text(message);
            setTimeout(() => statusMsg.addClass("d-none"), 2200);
        }

        function formatTimestamp(timestamp) {
            if (!timestamp) return "-";
            const date = new Date(timestamp);
            if (Number.isNaN(date.getTime())) return timestamp;
            return date.toLocaleString();
        }

        function renderTable(dataObj) {
            ordersCache = dataObj || {};
            tableBody.empty();

            const keys = Object.keys(ordersCache);
            if (keys.length === 0) {
                tableBody.append(`
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">No orders found.</td>
                    </tr>
                `);
                return;
            }

            keys.forEach((id) => {
                const order = ordersCache[id] || {};
                tableBody.append(`
                    <tr data-id="${id}">
                        <td class="food-cell">${order.food || ""}</td>
                        <td class="table-cell">${order.table || ""}</td>
                        <td class="qty-cell">${order.qty || ""}</td>
                        <td class="time-cell">${formatTimestamp(order.timestamp)}</td>
                        <td class="text-center">
                            <button class="btn btn-sm btn-warning me-2 edit-btn">Edit</button>
                            <button class="btn btn-sm btn-danger delete-btn">Delete</button>
                        </td>
                    </tr>
                `);
            });
        }

        async function fetchAllOrders() {
            try {
                const response = await fetch(ordersEndpoint);
                if (!response.ok) throw new Error("Failed to load orders");
                const data = await response.json();
                renderTable(data || {});
            } catch (error) {
                showMessage("Could not load orders.", "danger");
            }
        }

        function startRealtimePolling() {
            // REST API + fetch() based near real-time refresh
            setInterval(fetchAllOrders, 2500);
        }

        $(document).on("click", ".delete-btn", async function() {
            const row = $(this).closest("tr");
            const id = row.data("id");

            try {
                const response = await fetch(`${firebaseConfig.databaseURL}/orders/${id}.json`, {
                    method: "DELETE"
                });
                if (!response.ok) throw new Error("Delete failed");
                await fetchAllOrders();
                showMessage("Order deleted.", "success");
            } catch (error) {
                showMessage("Could not delete order.", "danger");
            }
        });

        $(document).on("click", ".edit-btn", function() {
            const row = $(this).closest("tr");

            if (row.attr("data-editing") === "true") {
                return;
            }

            row.attr("data-editing", "true");

            const foodText = row.find(".food-cell").text().trim();
            const tableText = row.find(".table-cell").text().trim();
            const qtyText = row.find(".qty-cell").text().trim();

            row.find(".food-cell").html(`<input type="text" class="form-control form-control-sm edit-food" value="${foodText}">`);
            row.find(".table-cell").html(`<input type="number" class="form-control form-control-sm edit-table" value="${tableText}">`);
            row.find(".qty-cell").html(`<input type="number" min="1" class="form-control form-control-sm edit-qty" value="${qtyText}">`);
            row.find(".time-cell").html(`<span class="badge text-bg-secondary">Editing</span>`);

            row.find("td:last").html(`
                <button class="btn btn-sm btn-success me-2 save-btn">Save</button>
                <button class="btn btn-sm btn-secondary cancel-btn">Cancel</button>
            `);
        });

        $(document).on("click", ".cancel-btn", function() {
            const row = $(this).closest("tr");
            const id = row.data("id");
            const order = ordersCache[id] || {};

            row.attr("data-editing", "false");
            row.find(".food-cell").text(order.food || "");
            row.find(".table-cell").text(order.table || "");
            row.find(".qty-cell").text(order.qty || "");
            row.find(".time-cell").text(formatTimestamp(order.timestamp));
            row.find("td:last").html(`
                <button class="btn btn-sm btn-warning me-2 edit-btn">Edit</button>
                <button class="btn btn-sm btn-danger delete-btn">Delete</button>
            `);
        });

        $(document).on("click", ".save-btn", async function() {
            const row = $(this).closest("tr");
            const id = row.data("id");

            const updatedOrder = {
                food: row.find(".edit-food").val().trim(),
                table: row.find(".edit-table").val().trim(),
                qty: row.find(".edit-qty").val().trim(),
                timestamp: new Date().toISOString()
            };

            if (!updatedOrder.food || !updatedOrder.table || !updatedOrder.qty) {
                showMessage("Food, table and qty are required.", "danger");
                return;
            }

            try {
                const response = await fetch(`${firebaseConfig.databaseURL}/orders/${id}.json`, {
                    method: "PATCH",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(updatedOrder)
                });

                if (!response.ok) throw new Error("Update failed");
                await fetchAllOrders();
                showMessage("Order updated.", "success");
            } catch (error) {
                showMessage("Could not update order.", "danger");
            }
        });

        fetchAllOrders();
        startRealtimePolling();
    </script>
</body>
</html>
