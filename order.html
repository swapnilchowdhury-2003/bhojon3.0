<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bhojonroshik | Order</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        /* অর্ডার কার্ডের ডিজাইন */
        .order-card {
            border-radius: 20px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            background-color: rgba(255, 255, 255, 0.9);
        }
        .form-label { font-weight: bold; color: #333; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-6">
                <div class="card order-card p-4">
                    <h2 class="text-center mb-1 text-danger fw-bold">🍽️ Order Now</h2>
                    <p class="text-center text-muted small mb-4">আপনার অর্ডার দিন</p>

                      <form id="orderForm">

                        <!-- Food Item — URL থেকে auto fill হবে -->
                        <div class="mb-3">
                            <label class="form-label">FOOD ITEM</label>
                            <input type="text" id="foodItem" name="entry.1364024402" class="form-control" placeholder="Enter food item" required>
                        </div>

                        <!-- Table Number -->
                        <div class="mb-3">
                            <label class="form-label">TABLE NUMBER</label>
                            <input type="number" id="tableNumber" name="entry.1894539485" class="form-control" placeholder="আপনার টেবিল নম্বর লিখুন" required>
                        </div>

                        <!-- Quantity -->
                        <div class="mb-3">
                            <label class="form-label">QUANTITY</label>
                            <input type="number" id="quantity" name="entry.1475836413" class="form-control" placeholder="কতটি চাই?" min="1" required>
                        </div>

                        <button type="submit" class="btn btn-danger w-100 fw-bold py-2">
                            Place Order
                        </button>
                    </form>

                    <!-- সফল হলে এই message দেখাবে -->
                    <div id="successMsg" class="alert alert-success mt-3 d-none">
                        ✅ আপনার অর্ডারটি সফলভাবে জমা হয়েছে! ধন্যবাদ।
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC5_COc-eWmC3LZRWJurQykXkq6hX9EbvQ",
            authDomain: "bhojonroshik.firebaseapp.com",
            projectId: "bhojonroshik",
            storageBucket: "bhojonroshik.firebasestorage.app",
            messagingSenderId: "306999367535",
            appId: "1:306999367535:web:9d617d11321d956fb2ba9a",
            databaseURL: "https://bhojonroshik-default-rtdb.asia-southeast1.firebasedatabase.app"
        };

        const ordersEndpoint = `${firebaseConfig.databaseURL}/orders.json`;

        // =============================================
        // STEP 1: URL থেকে food item নাম নেওয়া
        // যেমন: order.html?item=Chicken+Biriyani
        // =============================================
        const params = new URLSearchParams(window.location.search);
        const item = params.get("item"); // food page থেকে পাঠানো নাম

        // Food item ফিল্ডে auto fill করা
        if (item) {
            document.getElementById("foodItem").value = item;
        } else {
            document.getElementById("foodItem").value = "";
        }

        // =============================================
        // STEP 2: Firebase-এ AJAX দিয়ে অর্ডার সেভ করা
        // =============================================
        document.getElementById("orderForm").addEventListener("submit", async function(event) {
            event.preventDefault();

            const food = document.getElementById("foodItem").value.trim();
            const table = document.getElementById("tableNumber").value.trim();
            const qty = document.getElementById("quantity").value.trim();

            const payload = {
                food,
                table,
                qty,
                timestamp: new Date().toISOString()
            };

            try {
                const response = await fetch(ordersEndpoint, {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error("Failed to save order");
                }

                document.getElementById("successMsg").classList.remove("d-none");
                this.reset();
                if (item) {
                    document.getElementById("foodItem").value = item;
                }
            } catch (error) {
                alert("অর্ডার সেভ করা যায়নি। পরে আবার চেষ্টা করুন।");
            }
        });
    </script>

</body>
</html>
